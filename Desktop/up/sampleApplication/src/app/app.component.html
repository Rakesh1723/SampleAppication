<div class="app-container">
    <header class="app-header">
    <h1>{{title}}</h1>
  </header>
  
  <main class="container">
    <div class="actions">
      <button class="open-modal-btn" (click)="openModal()">Open Modal</button>
    </div>

    <div class="tiles-grid">
      <app-tile
        title="Project Alpha"
        status="Active"
        field1Label="Tasks"
        field1Value="24"
        field2Label="Progress"
        field2Value="75%"
        field3Label="Due Date"
        field3Value="Mar 15">
      </app-tile>

      <app-tile
        title="Project Beta"
        status="In Review"
        field1Label="Tasks"
        field1Value="18"
        field2Label="Progress"
        field2Value="45%"
        field3Label="Due Date"
        field3Value="Apr 01">
      </app-tile>

      <app-tile
        title="Project Beta"
        status="In Review"
        field1Label="Tasks"
        field1Value="18"
        field2Label="Progress"
        field2Value="45%"
        field3Label="Due Date"
        field3Value="Apr 01">
      </app-tile>

      
    </div>

    <app-modal
      *ngIf="isModalOpen"
      [title]="'Example Modal'"
      [primaryButtonText]="'Save Changes'"
      [secondaryButtonText]="'Cancel'"
      (close)="closeModal()"
      (primaryAction)="onSave()"
      (secondaryAction)="closeModal()">
      <div class="modal-content-example">
        <p>This is an example of the reusable modal component.</p>
        <p>You can put any content here using ng-content.</p>
      </div>
    </app-modal>

    <router-outlet />
  </main>
</div>
