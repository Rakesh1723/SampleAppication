<div class="tile" 
     [ngClass]="{'tile-active': isActive}"
     (mousedown)="onMouseDown()"
     (mouseenter)="onMouseEnter()"
     (mouseleave)="onMouseLeave()">
  <div class="tile-header">
    <h3 class="tile-title">{{ title }}</h3>
    <div class="status-badge">{{ status1 }}</div>
    <div class="status-badge">{{ status2 }}</div>
  </div>
  <div class="tile-content">
    <div class="field-group">
      <div class="field">
        <span class="field-label">{{ field1Label }}</span>
        <span class="field-value">{{ field1Value }}</span>
      </div>
      <div class="field">
        <span class="field-label">{{ field2Label }}</span>
        <span class="field-value">{{ field2Value }}</span>
      </div>
      <div class="field">
        <span class="field-label">{{ field3Label }}</span>
        <span class="field-value">{{ field3Value }}</span>
      </div>
    </div>
  </div>
</div>
