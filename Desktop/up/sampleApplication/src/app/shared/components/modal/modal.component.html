<div class="modal-overlay">
  <div class="modal-container">
      <div class="modal-header">
          <h2 class="modal-title">{{ title }}</h2>
          <button class="close-button" *ngIf="showCloseButton" (click)="onClose()">
              <span>&times;</span>
          </button>
      </div>
      <div class="modal-content">
          <ng-content></ng-content>
      </div>
      <div class="modal-footer">
          <button class="button secondary-button" (click)="onSecondaryAction()">
              {{ secondaryButtonText }}
          </button>
          <button class="button primary-button" (click)="onPrimaryAction()">
              {{ primaryButtonText }}
          </button>
      </div>
  </div>
</div>
